<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Para ti — mensaje en código</title>
<style>
  :root{
    --bg:#87512a;
    --editor:##e3a89f;
    --line:#1c2333;
    --text:#872a2a;
    --muted:#5a6478;
    --keyword:#c792ea;
    --string:#a8d671;
    --type:#82aaff;
    --method:#ffcb6b;
    --comment:#5a6478;
    --accent:#7ee2c4;
    font-family: 'Courier New', monospace;
  }

  *{box-sizing:border-box;}

  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 15% 0%, rgba(126,226,196,.05), transparent 40%),
      var(--bg);
    color:var(--text);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }

  .stage{
    width:min(980px, 100%);
    display:grid;
    grid-template-columns: minmax(180px, 320px) minmax(0, 1fr);
    gap:18px;
    align-items:stretch;
  }

  .cover{
    border-radius:10px;
    overflow:hidden;
    border:1px solid var(--line);
    box-shadow:0 40px 100px rgba(0,0,0,.55);
    background:#000;
    min-height:260px;
    display:flex;
  }

  .cover img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }

  @media (max-width: 760px){
    .stage{
      grid-template-columns: 1fr;
    }
    .cover{
      min-height:200px;
    }
  }

  .ide{
    border-radius:10px;
    overflow:hidden;
    background:var(--editor);
    border:1px solid var(--line);
    box-shadow:0 40px 100px rgba(0,0,0,.55);
    display:flex;
    flex-direction:column;
    min-width:0;
  }

  .titlebar{
    display:flex;
    align-items:center;
    gap:8px;
    padding:11px 14px;
    background:#0a0d15;
    border-bottom:1px solid var(--line);
  }

  .dot{width:11px;height:11px;border-radius:50%;}
  .dot.red{background:#ff5f56;}
  .dot.yellow{background:#ffbd2e;}
  .dot.green{background:#27c93f;}

  .filename{
    margin-left:10px;
    font-size:12.5px;
    color:var(--muted);
    letter-spacing:.02em;
  }

  .run-btn{
    margin-left:auto;
    display:flex;
    align-items:center;
    gap:6px;
    border:1px solid var(--line);
    background:#121829;
    color:var(--accent);
    font-family:inherit;
    font-size:12px;
    font-weight:700;
    padding:6px 12px;
    border-radius:6px;
    cursor:pointer;
  }
  .run-btn:hover{background:#161e34;}
  .run-btn:disabled{opacity:.45;cursor:default;}
  .run-btn .tri{
    width:0;height:0;
    border-top:5px solid transparent;
    border-bottom:5px solid transparent;
    border-left:7px solid var(--accent);
  }

  .code{
    padding:22px 0 28px;
    font-size:13.5px;
    line-height:1.85;
    flex:1;
    min-height:260px;
    max-height:60vh;
    overflow-y:auto;
  }

  .code-line{
    display:flex;
    padding:0 18px;
    white-space:pre;
  }

  .code-line.active{
    background:rgba(126,226,196,.07);
    box-shadow:inset 3px 0 0 var(--accent);
  }

  .ln{
    width:34px;
    flex:none;
    color:#384258;
    user-select:none;
    text-align:right;
    padding-right:14px;
  }

  .kw{color:var(--keyword);}
  .ty{color:var(--type);}
  .me{color:var(--method);}
  .st{color:var(--string);}
  .cm{color:var(--comment);}
  .pl{color:var(--text);}

  .statusbar{
    display:flex;
    justify-content:space-between;
    padding:9px 16px;
    background:#0a0d15;
    border-top:1px solid var(--line);
    color:var(--muted);
    font-size:11.5px;
  }

  .statusbar .ok{color:var(--accent);}

  /* overlay + popup */
  .overlay{
    position:fixed;
    inset:0;
    background:rgba(4,6,10,.55);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:50;
    animation:fadeIn .15s ease;
  }
  .overlay.show{display:flex;}

  @keyframes fadeIn{ from{opacity:0;} to{opacity:1;} }
  @keyframes popIn{
    from{ transform:scale(.92) translateY(6px); opacity:0; }
    to{ transform:scale(1) translateY(0); opacity:1; }
  }

  .msgbox{
    width:min(380px, 90vw);
    background:#eef1f5;
    color:#1b1f27;
    border-radius:8px;
    overflow:hidden;
    box-shadow:0 30px 70px rgba(0,0,0,.5);
    font-family: Tahoma, Geneva, sans-serif;
    animation:popIn .18s ease;
  }

  .msgbox-title{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:linear-gradient(180deg,#3a4a6b,#283a5c);
    color:#fff;
    padding:8px 10px;
    font-size:13px;
    font-weight:700;
  }

  .msgbox-title .x{
    width:20px;height:20px;
    display:flex;align-items:center;justify-content:center;
    background:rgba(255,255,255,.12);
    border-radius:3px;
    font-size:12px;
    cursor:pointer;
  }

  .msgbox-body{
    display:flex;
    gap:14px;
    align-items:center;
    padding:24px 22px 18px;
    min-height:46px;
  }

  .info-icon{
    flex:none;
    width:34px;height:34px;
    border-radius:50%;
    background:#5b7fd6;
    color:#fff;
    display:flex;align-items:center;justify-content:center;
    font-size:18px;
    font-weight:800;
    font-family: Georgia, serif;
    font-style:italic;
  }

  .msgbox-text{
    font-size:14.5px;
    line-height:1.5;
  }

  .msgbox-footer{
    display:flex;
    justify-content:flex-end;
    gap:8px;
    padding:0 18px 18px;
  }

  .ok-btn{
    min-width:78px;
    padding:7px 14px;
    border:1px solid #9aa3b2;
    border-radius:4px;
    background:linear-gradient(180deg,#fdfdfd,#e4e7eb);
    color:#1b1f27;
    font-family: inherit;
    font-size:13px;
    cursor:pointer;
  }
  .ok-btn:hover{background:linear-gradient(180deg,#ffffff,#eceff3);}
  .ok-btn:active{transform:translateY(1px);}

  .progress{
    padding:0 18px 16px;
    font-size:11px;
    color:#6b7280;
    text-align:right;
  }

  .finished-card{
    margin:16px 18px 0;
    padding:14px 16px;
    border-radius:8px;
    background:rgba(126,226,196,.08);
    border:1px solid rgba(126,226,196,.25);
    color:var(--accent);
    font-size:12.5px;
    display:none;
  }
  .finished-card.show{display:block;}

  @media (max-width:560px){
    .code{font-size:12px;}
    .ln{width:26px;}
  }
</style>
</head>

<script>
  /* =======================================================
     EDITA AQUÍ TUS FRASES
     - "title" es lo que aparece arriba del popup (como
       "Vamos a Mirarnos - Rels B" en el video de referencia)
     - cada elemento de "lines" es una frase / línea que
       aparecerá en su propio popup, en orden
  ======================================================= */
  const PROGRAM = {
    title: "Para ti",
    lines: [
      "SE QUE TE MARCHASTE SIN SABER, SIN ESCUHAR SIN COMPRENDER.",
      "QUE HAY UNA DAGA ENVENENADA AQUI EN MI PECHO.",
      "EL MAL YA ESTA HECHO, SE QUE NO MEREZCO TU PERDON.",
      "QUE LASTIME TU CORAZON.",
      "HOY ME AVERGUENZO, FUI EL MOTIVO DE TU LLANTO.",
      "QUERIENDOTE TANTO, PUES...",
      "TE AMO!!."
    ]
  };

  const codeView = document.getElementById("codeView");
  const overlay = document.getElementById("overlay");
  const msgTitle = document.getElementById("msgTitle");
  const msgText = document.getElementById("msgText");
  const msgProgress = document.getElementById("msgProgress");
  const okBtn = document.getElementById("okBtn");
  const closeX = document.getElementById("closeX");
  const runBtn = document.getElementById("runBtn");
  const statusText = document.getElementById("statusText");
  const finishedCard = document.getElementById("finishedCard");

  msgTitle.textContent = PROGRAM.title;

  // Construye el "código fuente" visual a partir de las frases.
  // Es decorativo: simula un Main() en C# con una llamada
  // Console.Log(...) por cada línea del mensaje.
  function escapeForDisplay(str) {
    return str.replace(/"/g, '\\"');
  }

  function buildSourceLines() {
    const src = [];
    src.push([["kw","using"], ["pl"," System;"]]);
    src.push([]);
    src.push([["kw","class"], ["ty"," Programa"], ["pl"," {"]]);
    src.push([["pl","  static "], ["kw","void"], ["me"," Main"], ["pl","(string[] args) {"]]);
    PROGRAM.lines.forEach((line) => {
      src.push([
        ["pl","    "], ["ty","Consola"], ["pl","."], ["me","Mostrar"], ["pl","("],
        ["st",`"${escapeForDisplay(line)}"`], ["pl",");"]
      ]);
    });
    src.push([["pl","  }"]]);
    src.push([["pl","}"]]);
    return src;
  }

  function renderSource() {
    const src = buildSourceLines();
    codeView.innerHTML = src.map((tokens, i) => {
      const lineNum = i + 1;
      const content = tokens.map(([cls, text]) =>
        `<span class="${cls}">${text.replace(/</g,"&lt;")}</span>`
      ).join("");
      return `<div class="code-line" data-line="${lineNum}"><span class="ln">${lineNum}</span><span>${content || "&nbsp;"}</span></div>`;
    }).join("");
  }

  // Mapeo: cada frase corresponde a la línea de código que la "ejecuta"
  // (las primeras 4 líneas del archivo son fijas: using / vacío / class / Main)
  const FIRST_MESSAGE_LINE = 5;

  let currentIndex = 0;
  let running = false;

  function highlightLine(lineNumber) {
    codeView.querySelectorAll(".code-line").forEach(el => el.classList.remove("active"));
    const el = codeView.querySelector(`[data-line="${lineNumber}"]`);
    if (el) {
      el.classList.add("active");
      el.scrollIntoView({ block: "center", behavior: "smooth" });
    }
  }

  function showMessage(index) {
    const total = PROGRAM.lines.length;
    msgText.textContent = PROGRAM.lines[index];
    msgProgress.textContent = `línea ${index + 1} de ${total}`;
    highlightLine(FIRST_MESSAGE_LINE + index);
    overlay.classList.add("show");
    statusText.textContent = `ejecutando línea ${index + 1}/${total}…`;
  }

  function closePopup() {
    overlay.classList.remove("show");
    currentIndex++;
    if (currentIndex < PROGRAM.lines.length) {
      // pequeña pausa para que se sienta como ejecución paso a paso
      setTimeout(() => showMessage(currentIndex), 180);
    } else {
      finishRun();
    }
  }

  function finishRun() {
    running = false;
    runBtn.disabled = false;
    statusText.textContent = "ejecución terminada";
    finishedCard.classList.add("show");
    codeView.querySelectorAll(".code-line").forEach(el => el.classList.remove("active"));
  }

  function startRun() {
    if (running) return;
    if (!PROGRAM.lines.length) {
      statusText.textContent = "no hay líneas para mostrar";
      return;
    }
    running = true;
    runBtn.disabled = true;
    finishedCard.classList.remove("show");
    currentIndex = 0;
    showMessage(currentIndex);
  }

  okBtn.addEventListener("click", closePopup);
  closeX.addEventListener("click", closePopup);
  overlay.addEventListener("click", (e) => {
    if (e.target === overlay) closePopup();
  });
  document.addEventListener("keydown", (e) => {
    if (overlay.classList.contains("show") && (e.key === "Enter" || e.key === "Escape")) {
      closePopup();
    }
  });
  runBtn.addEventListener("click", startRun);

  renderSource();
</script>
</body>
</html>
